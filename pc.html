<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>希臘國旗 AR</title>

    <!-- A-Frame -->
    <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>

    <!-- MindAR -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            touch-action: none;
        }
    </style>
</head>

<body>

<a-scene
    mindar-image="
        imageTargetSrc: greece.mind;
        autoStart: true;
        uiLoading: true;
        uiError: true;
        uiScanning: true;
    "
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
>

    <!-- 載入資源 -->
    <a-assets>

        <!-- 3D模型 -->
        <a-asset-item
            id="parthenonModel"
            src="parthenon.glb">
        </a-asset-item>

    </a-assets>

    <!-- 環境光 -->
    <a-light
        type="ambient"
        intensity="2">
    </a-light>

    <!-- 方向光 -->
    <a-light
        type="directional"
        position="1 2 1"
        intensity="1">
    </a-light>

    <!-- 相機 -->
    <a-camera look-controls="enabled:false"></a-camera>
    <a-entity mindar-image-target="targetIndex:0">
     <a-box
    position="0 0 0"
    color="red"
    scale="0.3 0.3 0.3">
    </a-box>
    <!-- 3D模型 -->
    <a-gltf-model
        src="#parthenonModel"
        position="0 0.2 0"
        rotation="0 0 0"
        scale="0.15 0.15 0.15">
    </a-gltf-model>

    <!-- 說明背景 -->
    <a-plane
        position="0 -0.8 0"
        width="2"
        height="1"
        color="black"
        opacity="0.8">
    </a-plane>

    <!-- 說明文字 -->
    <a-text
        value="希臘 Greece\n首都：雅典\n著名建築：帕德嫩神廟\n藍白相間9條橫紋\n象徵愛琴海浪花"
        position="0 -0.8 0.01"
        align="center"
        width="1.8"
        color="white">
    </a-text>

</a-entity>

    <!-- 掃描目標 -->
    <a-entity mindar-image-target="targetIndex:0">

        <!-- 3D模型 -->
        <a-gltf-model
            src="#parthenonModel"
            position="0 0.2 0"
            rotation="0 0 0"
            scale="0.3 0.3 0.3"
            touch-transform>
        </a-gltf-model>

        <!-- 文字背景 -->
        <a-plane
            position="0 -0.8 0"
            width="2.3"
            height="1.2"
            color="#000000"
            opacity="0.8">
        </a-plane>

        <!-- 說明文字 -->
        <a-text
            value="
希臘 Greece

首都：雅典

著名建築：
帕德嫩神廟

國旗特色：
藍白相間9條橫紋

象徵愛琴海浪花
"
            position="0 -0.8 0.01"
            align="center"
            width="2"
            color="#FFFFFF"
            wrap-count="20">
        </a-text>

    </a-entity>

</a-scene>

<script>

AFRAME.registerComponent('touch-transform', {

    init: function () {

        const el = this.el;

        this.defaultScale = el.object3D.scale.x;
        this.currentScale = this.defaultScale;

        this.prevDistance = null;
        this.prevAngle = null;

        const scene = el.sceneEl;

        scene.addEventListener('renderstart', () => {

            const canvas = scene.canvas;

            canvas.addEventListener('touchstart', (e) => {

                if (e.touches.length === 2) {

                    const dx =
                        e.touches[0].clientX -
                        e.touches[1].clientX;

                    const dy =
                        e.touches[0].clientY -
                        e.touches[1].clientY;

                    this.prevDistance =
                        Math.hypot(dx, dy);

                    this.prevAngle =
                        Math.atan2(dy, dx);
                }

            });

            canvas.addEventListener('touchmove', (e) => {

                if (
                    e.touches.length === 2 &&
                    this.prevDistance
                ) {

                    const dx =
                        e.touches[0].clientX -
                        e.touches[1].clientX;

                    const dy =
                        e.touches[0].clientY -
                        e.touches[1].clientY;

                    const distance =
                        Math.hypot(dx, dy);

                    const angle =
                        Math.atan2(dy, dx);

                    const scaleFactor =
                        distance /
                        this.prevDistance;

                    this.currentScale *= scaleFactor;

                    this.currentScale =
                        Math.min(
                            Math.max(
                                this.currentScale,
                                0.1
                            ),
                            3
                        );

                    el.object3D.scale.set(
                        this.currentScale,
                        this.currentScale,
                        this.currentScale
                    );

                    const deltaAngle =
                        angle -
                        this.prevAngle;

                    el.object3D.rotation.z +=
                        deltaAngle;

                    this.prevDistance =
                        distance;

                    this.prevAngle =
                        angle;

                    e.preventDefault();
                }

            });

            canvas.addEventListener('touchend', () => {

                this.prevDistance = null;
                this.prevAngle = null;

            });

        });

    }

});

</script>

</body>
</html>
